name: Build XO Lite

on:
  push:
    branches: ['release/hydron']
    tags: ['hydron-*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'yarn'

      - name: Prepare environment
        run: |
          VERSION=${GITHUB_REF##*/}
          TIMESTAMP=$(date +%s)
          mkdir /tmp/xo-lite_${TIMESTAMP}
          TARBALL=/tmp/xo-lite_${TIMESTAMP}/xo-lite_${VERSION}.tar.gz
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "TARBALL=${TARBALL}" >> $GITHUB_ENV

      - name: Build XO dependencies
        run: yarn

      - name: Build XO Lite dependencies
        run: yarn build:xo-lite

      - name: Build XO Lite
        run: yarn vite build --base=/ --outDir dist
        working-directory: '@xen-orchestra/lite'

      - name: Add license
        run: cp scripts/agpl-3.0.txt dist/LICENSE
        working-directory: '@xen-orchestra/lite'

      - name: Generate tarball
        run: tar -c -z -f ${{ env.TARBALL }} --transform='s|^dist|xo-lite_${{ env.VERSION }}|' dist
        working-directory: '@xen-orchestra/lite'

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: xo-lite_${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          body: Whitestack XO Lite
          files: ${{ env.TARBALL }}
          draft: false
          prerelease: false
          overwrite_files: true
